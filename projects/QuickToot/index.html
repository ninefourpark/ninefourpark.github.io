<section id="intro">
  <p data-en='QuickToot is a browser extension for when you <strong>want to post, not scroll</strong>. Save your Mastodon timeline for later.🐘'
      data-zh-Hant="
      QuickToot 是一款 為 Mastodon 使用者設計的 瀏覽器外掛，解決「<strong>只想發個嘟，結果刷了半小時時間線</strong>」的痛點。🐘"
      data-zh-Hans="
      QuickToot 是一款 为 Mastodon 用户设计的 浏览器插件，解决「<strong>只想发个嘟，结果刷了半小时时间线</strong>」的痛点。🐘"></p>
</section>

<section id="features">
    <ul>
    <li data-en="
        <strong>Keyboard Magic</strong>: Hit a hotkey to pop up the composer instantly, no matter which tab you're on."
        data-zh-Hant="
        鍵盤召喚： 無論你在看什麼網頁，按一下快速鍵就直接彈出輸入框，寫完即走。"
        data-zh-Hans="
        键盘召唤： 无论你在看什么网页，按一下快捷键就直接弹出输入框，写完即走。"></li>

    <li data-en='
        <strong>Thread Master</strong>: Easily create threaded toots by automatically replying to your previous toot on the same topic.'
        data-zh-Hant="
        絲滑串文： 同話題的嘟文可自動回覆給上一則，形成嘟文串。"
        data-zh-Hans="
        丝滑串文： 同话题的嘟文可自动回复给上一则，形成嘟文串。"></li>

    <li data-en="
        <strong>Templates</strong>: Save time with pre-filled texts for daily toots or hashtags."
        data-zh-Hant="
        預填範本： 支援預填常用標籤和文字（如：#讀書記錄、Day X），助力懶人發嘟。"
        data-zh-Hans="
        预填模板： 支持预填常用标签和文字（如：#读书记录、Day X），助力懒人发嘟。"></li>

    <li data-en="
        <strong>Privacy First</strong>: Your data stays in your browser. No middlemen, just you and your Mastodon instance. Export your entire setup as a JSON backup at any time."
        data-zh-Hant="
        隱私保障： 你的資料只存在本地瀏覽器。你可以隨時將所有資料匯出為 JSON 檔案進行備份。"
        data-zh-Hans="
        隐私保障： 你的数据只存在本地浏览器。你可以随时将所有数据导出为 JSON 文件进行备份。"></li>     

</section>

<section id="install">

  <p class="note" 
     data-en="Fun fact: The Chrome Store charges a $5 fee, and setting up international payments is a headache. So, I'm sharing the source code with you directly! It's safe, free, and transparent, only takes a minute to set up."

        data-zh-Hans="前往 <a href='{{GITHUB_RELEASE_URL}}' target='_blank'>下载页面</a> 获取最新版本（点击“Source code zip”），下载后解压到你的电脑中。"></li>

    <li data-en="In your browser, go to your 'Extensions' page (you can type <code>chrome://extensions/</code> in the address bar)."
        data-zh-Hant="打開瀏覽器，進入「擴充功能」頁面（也可以直接在網址列輸入 <code>chrome://extensions/</code>）。"

<li data-en="Toggle 'Developer mode' on the top right. This simply tells your browser it's okay to load a tool you've downloaded yourself. You only have to do the 'Developer Mode' dance once—after that, QuickToot lives in your browser just like any other extension."
    data-zh-Hant="開啟右上角的「開發者模式」。"
    data-zh-Hans="开启右上角的“开发者模式”。">
</li>

    <li data-en="Click 'Load unpacked' and select the folder you just unzipped. You're all set!🎉"
        data-zh-Hant="點擊左上角的「載入已解壓縮擴充程式」，選擇剛才解壓的資料夾。——大功告成！🎉"

  </ol>

  <div class="update-info" >
    <p data-en="Stay updated: Check the <a href='{{CHANGELOG_URL}}'>Changelog</a> for new features, or subscribe via <a href='{{RSS_URL}}' target='_blank'>RSS</a> to get notified whenever a new version drops."
       data-zh-Hant="你可以查看 <a href='{{CHANGELOG_URL}}'>更新日誌</a> 了解新功能，或訂閱 <a href='{{RSS_URL}}' target='_blank'>RSS</a>，第一時間獲得更新通知。"

<section id="faq">
  <h2 data-en="Frequently Asked Questions" 
      data-zh-Hant="常見問題" 
      data-zh-Hans="常见问题">常见问题</h2>
  <ol>
    <li>
      <strong data-en="How does the 'Threading' feature work?" 
              data-zh-Hant="如何啟用串文功能？ / 串文功能是如何運作的？" 
              data-zh-Hans="如何启用串文功能？ / 串文功能是如何运作的？">如何启用串文功能？</strong>
      <p data-en='Once "Enable threading" is toggled in settings, QuickToot tracks your latest post ID for each topic. New posts will automatically reply to the previous one, building a thread as you go.'
         data-zh-Hant="在設定中勾選「啟用串文」，並授權 Mastodon。QuickToot 會開始記錄你在每個話題下發出的最近一則嘟文的 ID。當你在同話題下再次發嘟時，系統預設將新嘟文以「回覆」形式接續在舊嘟文之後，自動形成串文。" 
         data-zh-Hans="在设置中勾选「启用串文」，并授权 Mastodon。QuickToot 会开始记录你在各话题下发出的最近一条嘟文的 ID。当你在同话题下再次发嘟时，系统默认将新嘟文以“回复”形式接续在旧嘟文之后，自动形成串文。"></p>
    </li>

    <li>
      <strong data-en="Can I choose to start a new post instead of a reply?"
              data-zh-Hant="有時想回覆串文，有時不想，可以選擇嗎？" 
              data-zh-Hans="有时想回复串文，有时不想，可以选择吗？"></strong>
      <p data-en="Absolutely. Even with threading enabled, you can easily toggle between 'Reply to thread' and 'Post as new' directly in the composer before you hit send." 
         data-zh-Hant="可以。即使在設定中勾選了「啟用串文」，發布前你仍可在編輯器中自由切換「回覆已有串」或「作為新串第一條嘟文」。" 
         data-zh-Hans="可以。即使在设置中勾选了「启用串文」，发布前你仍可在编辑器中自由切换“回复已有串”或“作为新串第一条嘟文”。"></p>
    </li>

    <li>
      <strong data-en="Can I link QuickToot to a thread I created previously?"
              data-zh-Hant="我已經有一條串文了，QuickToot 可以接續在該串文下方發佈嗎？" 
              data-zh-Hans="我已有一条串文了，QuickToot 发的嘟嘟可以回复到之前建立的已有串吗？"></strong>
      <p data-en="Yes. Simply click 'More' (...) → 'Thread' for that topic and enter the ID of the toot you want to reply to. QuickToot will pick up the thread from there." 
         data-zh-Hant="可以，QuickToot 支援繫結已有串。在話題旁點選「更多」(...) →「繫結串文」，並輸入你想回覆的那則嘟文 ID 。QuickToot 就會從該處開始自動串文。" 
         data-zh-Hans="可以，QuickToot 支持绑定已有串。在话题旁点击“更多”(...) →“绑定串文”，并输入你想回复的那条嘟文 ID 。QuickToot 就会从该处开始自动串文。"></p>
    </li>

    <li>
      <strong 
        data-en="Opening the composer shows a full page. Can it open as a small popup instead?"
        data-zh-Hant="現在撰寫嘟文會打開一個標籤頁，可以改成小彈窗嗎？"
        data-zh-Hans="现在撰写嘟文跳出的是一个标签页，可以改成小弹窗吗？">
      </strong>
    
      <p 
        data-en="This feature may be added in the future. For now, if you enable “Thread Mode” in the settings, the composer will appear as a small popup. By default it continues the current thread, so when posting you may need to choose “Start new thread”."
        data-zh-Hant="之後可能會加入這個功能。現在如果在設定中「啟用串文」，撰寫視窗會以小彈窗開啟。不過預設會接續同一個話題的串文，如果想發單條嘟嘟，可以在發嘟時手動選擇「開啟新串」。"
        data-zh-Hans="之后可能会加入这个功能。现在如果在设置中「启用串文」，撰写窗口会以小弹窗打开。不过默认会回复在同一话题的嘟文串里，如果想发单条嘟，可以在发嘟时手动选择「开启新串」。">
      </p>
    </li>

    <li>
      <strong data-en="Why don't @mentions work?" 
              data-zh-Hant="為什麼 @ 提及不生效？" 
              data-zh-Hans="为什么 @ 提及不生效？">为什么 @ 提及不生效？</strong>
      <p data-en="To keep QuickToot lean and prevent accidental spam, @mentions are not supported. It's best used for your own logs, rants, and updates!" 
         data-zh-Hant="QuickToot 不支援 @ 提及功能。QuickToot 專為個人日誌、心情吐槽與日常紀錄設計。" 
         data-zh-Hans="QuickToot 不支持 @ 提及功能。QuickToot 专为个人日志、心情吐槽与日常记录设计。"></p>
    </li>

    <li>
      <strong data-en="Can I turn off toot templates?" 
              data-zh-Hant="不想用嘟文範本，可以關閉嗎？" 
              data-zh-Hans="不想用嘟文模板，可以关闭吗？">不想用嘟文模板，可以关闭吗？</strong>
      <p data-en="Yes, clear the 'Toot Template (Global)' in settings and save changes." 
         data-zh-Hant="可以，在設定中清空「預設嘟文範本（全局）」並保存。" 
         data-zh-Hans="可以，在设置中清空「嘟文模板（全局）」并保存。">可以，在设置中清空「嘟文模板（全局）」并保存。</p>
    </li>

    <li>
      <strong data-en="Why can't I select 'Public' when replying in a thread?" 
              data-zh-Hant="為什麼我回覆串文時不能選「公開」？" 
              data-zh-Hans="为什么我回复串文时不能选“公开”？">为什么回复串文时不能选“公开”？</strong>
      <p data-en="Replies inherit the visibility of the original thread and cannot exceed it." 
         data-zh-Hant="回覆會繼承原串的可見性，不能高於原串設定。" 
         data-zh-Hans="回复会继承原串的可见性，不能高于原串设置。">回复会继承原串的可见性，不能高于原串设置。</p>
    </li>

    <li>
      <strong data-en="Will clearing my browser cache delete my data?" 
              data-zh-Hant="清除瀏覽器快取會刪除資料嗎？" 
              data-zh-Hans="清除浏览器缓存会删除数据吗？"></strong>
      <p>
        <span data-en="Yes. Since we store everything locally for your privacy, clearing your browser data will wipe QuickToot." 
         data-zh-Hant="是的。資料皆存在本地。若你清除瀏覽器資料，QuickToot 的設定也會隨之抹除。" 
         data-zh-Hans="是的。数据皆存在本地。若你清除浏览器数据，QuickToot 的设置也会随之抹除。">
        </span>
        <strong data-en="Friendly tip: Export a backup occasionally!" 
            data-zh-Hant="小撇步：建議定期匯出備份。" 
            data-zh-Hans="小贴士：建议定期导出备份。">
        </strong>
         </p>
    </li>

    <li>
      <strong 
        data-en="I tried to change the keyboard shortcut, but the button does nothing."
        data-zh-Hant="想要修改快捷鍵，但按下按鈕沒有反應？"
        data-zh-Hans="想要修改快捷键，但是按钮没有反应？">
      </strong>
    
      <p 
        data-en="This was a small bug in version 1.0. Sorry about that. If the shortcut button doesn't respond, you can change it manually in your browser. Type chrome://extensions/shortcuts in the address bar and find QuickToot."
        data-zh-Hant="v1.0 版本的一個小 Bug，抱歉。如果修改快捷鍵時按鈕沒有反應，可以手動在瀏覽器地址列輸入 chrome://extensions/shortcuts，然後找到 QuickToot 來修改。"
        data-zh-Hans="v1.0 版本的一个小 Bug，抱歉。如果修改快捷键时按钮没有反应，可以手动在浏览器地址栏输入 chrome://extensions/shortcuts，然后找到 QuickToot 来修改。">
      </p>
    </li>
    
      
  </ol>
</section>
